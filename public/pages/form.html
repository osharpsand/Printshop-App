<!DOCTYPE html>
<html>
    <head>
        <title>3D Print Orders</title>
        <link rel="stylesheet" href="/css/style.css">
    </head>
    <body>
        <script src="/js/form.js"></script>
        
        <div class="container">
            <h1>Ollie's Custom 3D Prints</h1>

            <form id="orderForm">
        
                <div class="form-section">
                    <h2>Your Information</h2>
            
                    <div class="form-row">
                         <div class="form-group">
                            <label for="firstName">First Name *</label>
                            <input type="text" id="firstName" placeholder="First Name" required>
                        </div>
                        <div class="form-group">
                            <label for="lastName">Last Name *</label>
                            <input type="text" id="lastName" placeholder="Last Name" required>
                        </div>
                    </div>

                    <div class="form-group">                            <label for="contact">Contact (Phone or Email)</label>
                        <input type="text" id="contact" placeholder="(555) 123-4567 or email@example.com">
                    </div>

                    <div class="form-group">
                        <label for="notes">Notes</label>
                        <textarea id="notes" placeholder="Any additional notes about your order..."></textarea>
                    </div>
                </div>

                <div class="form-section">
                    <h2>Choose from our existing prints!</h2>
                    <div id="existingOrdersContainer">
                    </div>
                    <div id="existingTotalPrice" class="total-price" style="display: none;">
                        <strong>Total for Existing Prints: $<span id="existingTotal">0.00</span></strong>
                    </div>
                </div>

                <div class="form-section">
                    <h2>Choose your own print</h2>
                    <div id="customOrdersContainer">
                    </div>
                </div>

                <button type="submit" class="primary-btn">Submit Order</button>

            </form>

            <div class="success" id="successMsg"></div>

        </div>
    </body>
</html>
